<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Factday — Админ</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0a0a0a; --bg2:#141414; --bg3:#1e1e1e; --border:#2a2a2a;
      --text:#f0f0f0; --text2:#888; --accent:#f97316; --green:#10b981;
      --red:#ef4444; --gold:#f59e0b; --blue:#3b82f6;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    h1,h2,h3{font-family:'Syne',sans-serif;}

    /* ── LOGIN ── */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .login-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
    .login-box h1{font-size:1.6rem;margin-bottom:4px;} .login-box h1 span{color:var(--accent);}
    .login-box p{color:var(--text2);font-size:.85rem;margin-bottom:28px;}
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:.78rem;color:var(--text2);margin-bottom:5px;}
    .field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:12px 14px;font-size:.92rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
    .field input:focus{border-color:var(--accent);}
    .btn-primary{width:100%;background:var(--accent);border:none;border-radius:12px;color:#fff;padding:13px;font-weight:700;font-size:.95rem;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:6px;transition:opacity .2s;}
    .btn-primary:hover{opacity:.88;}
    .err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);padding:10px 14px;border-radius:10px;font-size:.83rem;margin-bottom:14px;display:none;}

    /* ── ADMIN ── */
    .admin{display:none;}
    .anav{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:50;}
    .anav .logo{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;} .anav .logo span{color:var(--accent);}
    .anav-right{display:flex;align-items:center;gap:10px;}
    .online-badge{display:flex;align-items:center;gap:6px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);border-radius:20px;padding:5px 12px;font-size:.82rem;font-weight:600;color:var(--green);}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .logout-btn{background:transparent;border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:10px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;transition:all .2s;}
    .logout-btn:hover{border-color:var(--red);color:var(--red);}

    .abody{max-width:1100px;margin:0 auto;padding:26px 20px;}

    /* STATS */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:26px;}
    .stat{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center;}
    .stat .val{font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800;margin-bottom:4px;}
    .stat .lbl{font-size:.75rem;color:var(--text2);}

    /* GRID */
    .agrid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
    .acard{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
    .acard-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .acard-hdr h3{font-size:.95rem;font-weight:700;}
    .acard-body{padding:18px;}

    /* FORMS */
    .frow{margin-bottom:11px;}
    .frow label{display:block;font-size:.76rem;color:var(--text2);margin-bottom:4px;}
    .frow input,.frow select,.frow textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:9px 12px;font-size:.86rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
    .frow input:focus,.frow select:focus,.frow textarea:focus{border-color:var(--accent);}
    .frow textarea{resize:vertical;min-height:52px;}
    .frow select option{background:var(--bg3);}
    .frow-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

    .btn{padding:9px 16px;border-radius:10px;font-weight:600;font-family:'DM Sans',sans-serif;font-size:.83rem;cursor:pointer;border:none;transition:opacity .2s;}
    .btn:hover{opacity:.85;} .btn:disabled{opacity:.4;cursor:default;}
    .btn-full{width:100%;padding:11px;}
    .bo{background:var(--accent);color:#fff;} .bg{background:var(--green);color:#fff;}
    .br{background:var(--red);color:#fff;} .bgo{background:var(--gold);color:#000;}
    .bb{background:var(--blue);color:#fff;}

    /* QUESTIONS */
    .qlist{display:flex;flex-direction:column;gap:7px;max-height:300px;overflow-y:auto;margin-bottom:14px;}
    .qitem{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 13px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
    .qitem-txt{font-size:.83rem;flex:1;line-height:1.4;}
    .qitem-opts{font-size:.72rem;color:var(--text2);}
    .qitem-date{font-size:.7rem;color:var(--accent);white-space:nowrap;}
    .qitem-del{background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:.9rem;padding:2px 6px;border-radius:6px;transition:all .2s;}
    .qitem-del:hover{background:rgba(239,68,68,.1);color:var(--red);}

    /* BETS */
    .blist{display:flex;flex-direction:column;gap:10px;max-height:420px;overflow-y:auto;}
    .bitem{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;}
    .bitem-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
    .bitem-q{font-size:.88rem;font-weight:600;line-height:1.4;flex:1;}
    .bitem-cat{font-size:.68rem;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);white-space:nowrap;}
    .bitem-pool{display:flex;gap:12px;font-size:.76rem;color:var(--text2);margin-bottom:10px;}
    .bitem-pool span{display:flex;align-items:center;gap:4px;}
    .dy{width:6px;height:6px;border-radius:50%;background:var(--green);}
    .dn{width:6px;height:6px;border-radius:50%;background:var(--red);}
    .bitem-actions{display:flex;gap:8px;flex-wrap:wrap;}
    .bstatus{display:inline-flex;align-items:center;gap:4px;font-size:.72rem;font-weight:600;padding:3px 9px;border-radius:20px;}
    .bstatus.open{background:rgba(16,185,129,.12);color:var(--green);}
    .bstatus.closed{background:rgba(239,68,68,.12);color:var(--red);}
    .bstatus.resolved{background:rgba(245,158,11,.12);color:var(--gold);}

    /* TOAST */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 20px;font-size:.85rem;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.3);z-index:400;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    .divider{height:1px;background:var(--border);margin:14px 0;}
    .section-label{font-size:.7rem;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:10px;}

    @media(max-width:700px){.agrid{grid-template-columns:1fr;}.stats{grid-template-columns:repeat(2,1fr);}.anav{padding:12px 14px;}}
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h1>fact<span>day</span></h1>
    <p>Панель администратора</p>
    <div class="err" id="loginErr"></div>
    <div class="field"><label>Логин</label><input type="text" id="loginUser" placeholder="rufyk565"></div>
    <div class="field"><label>Пароль аккаунта</label><input type="password" id="loginPass" placeholder="••••••••"></div>
    <div class="field"><label>Админ-пароль</label><input type="password" id="adminPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-primary" onclick="doLogin()">Войти</button>
  </div>
</div>

<!-- ADMIN -->
<div class="admin" id="adminWrap">
  <nav class="anav">
    <div class="logo">fact<span>day</span> <small style="font-size:.7rem;color:var(--text2);font-family:'DM Sans',sans-serif;font-weight:400;">admin</small></div>
    <div class="anav-right">
      <div class="online-badge"><div class="dot"></div> <span id="onlineCount">0</span> онлайн</div>
      <button class="logout-btn" onclick="doLogout()">Выйти</button>
    </div>
  </nav>

  <div class="abody">

    <!-- STATS -->
    <div class="stats">
      <div class="stat"><div class="val" id="statUsers">—</div><div class="lbl">Пользователей</div></div>
      <div class="stat"><div class="val" id="statBets">—</div><div class="lbl">Ставок всего</div></div>
      <div class="stat"><div class="val" id="statPool">—</div><div class="lbl">🪙 в пулах</div></div>
      <div class="stat"><div class="val" id="statVotes">—</div><div class="lbl">Голосов сегодня</div></div>
    </div>

    <div class="agrid">

      <!-- LEFT: QUESTIONS + NEW BET -->
      <div style="display:flex;flex-direction:column;gap:18px;">

        <!-- QUESTIONS -->
        <div class="acard">
          <div class="acard-hdr">
            <h3>📅 Вопросы дня</h3>
            <span style="font-size:.75rem;color:var(--text2);">автоматически по датам</span>
          </div>
          <div class="acard-body">
            <div class="section-label">Добавить вопрос</div>
            <div class="frow"><label>Вопрос</label><input type="text" id="qText" placeholder="Что вкуснее — пицца или бургер?"></div>
            <div class="frow-2">
              <div class="frow" style="margin:0"><label>Вариант А</label><input type="text" id="qA" placeholder="🍕 Пицца"></div>
              <div class="frow" style="margin:0"><label>Вариант Б</label><input type="text" id="qB" placeholder="🍔 Бургер"></div>
            </div>
            <div class="frow"><label>Дата (ГГГГ-ММ-ДД)</label><input type="date" id="qDate"></div>
            <button class="btn bo btn-full" onclick="addQuestion()" style="margin-top:4px">Добавить вопрос</button>

            <div class="divider"></div>
            <div class="section-label">Запланированные вопросы</div>
            <div class="qlist" id="qList"><div style="color:var(--text2);font-size:.83rem;text-align:center;padding:20px">Загрузка...</div></div>

            <!-- PRESET 10 QUESTIONS -->
            <button class="btn bb btn-full" onclick="loadPreset()" style="margin-top:4px">⚡ Загрузить 10 готовых вопросов</button>
          </div>
        </div>

        <!-- NEW BET -->
        <div class="acard">
          <div class="acard-hdr"><h3>➕ Новая ставка</h3></div>
          <div class="acard-body">
            <div class="frow"><label>Вопрос ставки</label><textarea id="bQ" placeholder="Поднимется ли биткоин до $200k до конца года?"></textarea></div>
            <div class="frow-2">
              <div class="frow" style="margin:0"><label>Категория</label>
                <select id="bCat">
                  <option>Крипто</option><option>Спорт</option><option>Технологии</option>
                  <option>Политика</option><option>Сайт</option><option>Другое</option>
                </select>
              </div>
              <div class="frow" style="margin:0"><label>Дедлайн</label><input type="date" id="bDeadline"></div>
            </div>
            <button class="btn bo btn-full" onclick="addBet()">Создать ставку</button>
          </div>
        </div>

      </div>

      <!-- RIGHT: BETS MANAGEMENT -->
      <div class="acard">
        <div class="acard-hdr">
          <h3>🪙 Управление ставками</h3>
          <button class="btn bb" onclick="loadBets()" style="padding:6px 12px;font-size:.75rem">Обновить</button>
        </div>
        <div class="acard-body">
          <div class="blist" id="bList"><div style="color:var(--text2);font-size:.83rem;text-align:center;padding:40px">Загрузка...</div></div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, push, get, update, remove, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg = {
  apiKey: "AIzaSyDO7YaClNnlsyI-6OwIM_SQuD8Cf7x4PV8",
  authDomain: "factday-941ea.firebaseapp.com",
  databaseURL: "https://factday-941ea-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "factday-941ea",
  storageBucket: "factday-941ea.firebasestorage.app",
  messagingSenderId: "174146500396",
  appId: "1:174146500396:web:79e525da64d07fb2d45e89"
};
const app = initializeApp(cfg);
const db = getDatabase(app);
const today = new Date().toISOString().slice(0,10);

// ── ADMIN PASSWORD (меняй здесь) ──
const ADMIN_PASSWORD = 'factday2025';

// ── TOAST ──
const toast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
};

// ── LOGIN ──
window.doLogin = async () => {
  const u = document.getElementById('loginUser').value.trim().toLowerCase();
  const p = document.getElementById('loginPass').value;
  const ap = document.getElementById('adminPass').value;
  const err = document.getElementById('loginErr');
  err.style.display = 'none';

  if (u !== 'rufyk565') { err.textContent = 'Доступ только для rufyk565'; err.style.display = 'block'; return; }
  if (ap !== ADMIN_PASSWORD) { err.textContent = 'Неверный админ-пароль'; err.style.display = 'block'; return; }

  // verify account password in firebase
  const snap = await get(ref(db, 'users/rufyk565'));
  if (!snap.exists()) { err.textContent = 'Аккаунт rufyk565 не найден — сначала зарегистрируйся на сайте'; err.style.display = 'block'; return; }
  if (snap.val().password !== p) { err.textContent = 'Неверный пароль аккаунта'; err.style.display = 'block'; return; }

  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('adminWrap').style.display = 'block';
  initAdmin();
};

window.doLogout = () => {
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('adminWrap').style.display = 'none';
};

// ── ONLINE COUNTER ──
const onlineRef = ref(db, 'online/admin');
const initOnline = () => {
  // write presence
  set(onlineRef, { t: Date.now() });
  setInterval(() => set(onlineRef, { t: Date.now() }), 30000);

  // listen to all online
  onValue(ref(db, 'online'), snap => {
    const data = snap.val() || {};
    const now = Date.now();
    // count entries updated in last 2 minutes
    const active = Object.values(data).filter(v => v && v.t && (now - v.t) < 120000).length;
    document.getElementById('onlineCount').textContent = active;
  });
};

// ── STATS ──
const loadStats = async () => {
  // users
  const uSnap = await get(ref(db, 'users'));
  document.getElementById('statUsers').textContent = uSnap.exists() ? Object.keys(uSnap.val()).length : 0;

  // bets & pool
  const bSnap = await get(ref(db, 'bets'));
  if (bSnap.exists()) {
    const bets = bSnap.val();
    document.getElementById('statBets').textContent = Object.keys(bets).length;
    const pool = Object.values(bets).reduce((s, b) => s + (b.yesPool||0) + (b.noPool||0), 0);
    document.getElementById('statPool').textContent = pool;
  } else {
    document.getElementById('statBets').textContent = 0;
    document.getElementById('statPool').textContent = 0;
  }

  // today votes
  const vSnap = await get(ref(db, 'polls/'+today+'/votes'));
  if (vSnap.exists()) {
    const v = vSnap.val();
    document.getElementById('statVotes').textContent = (v.a||0) + (v.b||0);
  } else {
    document.getElementById('statVotes').textContent = 0;
  }
};

// ── QUESTIONS ──
const loadQuestions = () => {
  onValue(ref(db, 'polls'), snap => {
    const list = document.getElementById('qList');
    const data = snap.val() || {};
    const entries = Object.entries(data).sort((a,b) => a[0].localeCompare(b[0]));
    if (entries.length === 0) { list.innerHTML = '<div style="color:var(--text2);font-size:.83rem;text-align:center;padding:20px">Нет вопросов</div>'; return; }
    list.innerHTML = '';
    entries.forEach(([date, q]) => {
      const div = document.createElement('div');
      div.className = 'qitem';
      const isToday = date === today;
      div.innerHTML = `
        <div style="flex:1">
          <div class="qitem-txt">${q.question || '—'}</div>
          <div class="qitem-opts" style="margin-top:3px">${q.optionA||''} / ${q.optionB||''}</div>
        </div>
        <div class="qitem-date">${isToday ? '🟢 сегодня' : date}</div>
        <button class="qitem-del" onclick="delQuestion('${date}')" title="Удалить">✕</button>
      `;
      list.appendChild(div);
    });
  }, { onlyOnce: true });
};

window.addQuestion = async () => {
  const q = document.getElementById('qText').value.trim();
  const a = document.getElementById('qA').value.trim();
  const b = document.getElementById('qB').value.trim();
  const d = document.getElementById('qDate').value;
  if (!q || !a || !b || !d) { toast('Заполни все поля'); return; }
  await set(ref(db, 'polls/'+d), { question: q, optionA: a, optionB: b, votes: {a:0, b:0} });
  document.getElementById('qText').value = '';
  document.getElementById('qA').value = '';
  document.getElementById('qB').value = '';
  document.getElementById('qDate').value = '';
  toast('✅ Вопрос добавлен на ' + d);
  loadQuestions();
};

window.delQuestion = async (date) => {
  if (!confirm('Удалить вопрос на ' + date + '?')) return;
  await remove(ref(db, 'polls/'+date));
  toast('🗑️ Вопрос удалён');
  loadQuestions();
};

// 10 preset questions
window.loadPreset = async () => {
  if (!confirm('Загрузить 10 готовых вопросов на следующие 10 дней?')) return;
  const presets = [
    { q: 'Что вкуснее?', a: '☕ Кофе', b: '🍵 Чай' },
    { q: 'Какой транспорт лучше?', a: '🚗 Машина', b: '🚇 Метро' },
    { q: 'Что важнее?', a: '💰 Деньги', b: '❤️ Любовь' },
    { q: 'Какое время года лучше?', a: '☀️ Лето', b: '❄️ Зима' },
    { q: 'Что лучше на завтрак?', a: '🥞 Блины', b: '🍳 Яичница' },
    { q: 'Какой жанр фильмов лучше?', a: '😂 Комедия', b: '😱 Ужасы' },
    { q: 'Где лучше работать?', a: '🏠 Дома', b: '🏢 В офисе' },
    { q: 'Что лучше для отдыха?', a: '🏖️ Море', b: '🏔️ Горы' },
    { q: 'Какой питомец лучше?', a: '🐶 Собака', b: '🐱 Кошка' },
    { q: 'Что лучше в пятницу вечером?', a: '🎉 Вечеринка', b: '🎮 Дома с игрой' },
  ];
  const base = new Date();
  for (let i = 0; i < presets.length; i++) {
    const d = new Date(base);
    d.setDate(d.getDate() + i);
    const dateStr = d.toISOString().slice(0,10);
    const snap = await get(ref(db, 'polls/'+dateStr));
    if (!snap.exists()) {
      await set(ref(db, 'polls/'+dateStr), { question: presets[i].q, optionA: presets[i].a, optionB: presets[i].b, votes: {a:0,b:0} });
    }
  }
  toast('⚡ 10 вопросов загружены!');
  loadQuestions();
};

// ── BETS ──
window.loadBets = async () => {
  const bSnap = await get(ref(db, 'bets'));
  const list = document.getElementById('bList');
  if (!bSnap.exists()) { list.innerHTML = '<div style="color:var(--text2);font-size:.83rem;text-align:center;padding:40px">Нет ставок</div>'; return; }
  const bets = bSnap.val();
  list.innerHTML = '';
  for (const [id, bet] of Object.entries(bets)) {
    const total = (bet.yesPool||0) + (bet.noPool||0);
    const div = document.createElement('div');
    div.className = 'bitem';
    div.innerHTML = `
      <div class="bitem-top">
        <div class="bitem-q">${bet.question}</div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <span class="bitem-cat">${bet.category}</span>
          <span class="bstatus ${bet.status||'open'}">${bet.status==='resolved'?'✓ решено':bet.status==='closed'?'🔴 закрыто':'🟢 открыто'}</span>
        </div>
      </div>
      <div class="bitem-pool">
        <span><div class="dy"></div> Да: 🪙${bet.yesPool||0}</span>
        <span><div class="dn"></div> Нет: 🪙${bet.noPool||0}</span>
        <span>Всего: 🪙${total}</span>
        <span style="color:var(--text2)">до ${bet.deadline}</span>
      </div>
      <div class="bitem-actions">
        ${bet.status==='open' ? `<button class="btn br" onclick="closeBet('${id}')">Закрыть приём</button>` : ''}
        ${bet.status!=='resolved' ? `
          <button class="btn bg" onclick="resolveBet('${id}','yes')">✅ Победили ДА</button>
          <button class="btn br" onclick="resolveBet('${id}','no')">❌ Победили НЕТ</button>
        ` : `<span style="font-size:.78rem;color:var(--gold)">✓ Итог: ${bet.result==='yes'?'Да победило':'Нет победило'}</span>`}
        <button class="btn" style="background:var(--bg);border:1px solid var(--border);color:var(--text2)" onclick="deleteBet('${id}')">🗑️</button>
      </div>
    `;
    list.appendChild(div);
  }
};

window.addBet = async () => {
  const q = document.getElementById('bQ').value.trim();
  const cat = document.getElementById('bCat').value;
  const dl = document.getElementById('bDeadline').value;
  if (!q || !dl) { toast('Заполни вопрос и дедлайн'); return; }
  await push(ref(db, 'bets'), { question: q, category: cat, deadline: dl, status: 'open', yesPool: 0, noPool: 0 });
  document.getElementById('bQ').value = '';
  document.getElementById('bDeadline').value = '';
  toast('✅ Ставка создана!');
  loadBets(); loadStats();
};

window.closeBet = async (id) => {
  await update(ref(db, 'bets/'+id), { status: 'closed' });
  toast('🔴 Приём ставок закрыт');
  loadBets();
};

window.resolveBet = async (id, result) => {
  if (!confirm(`Отметить победу "${result==='yes'?'ДА':'НЕТ'}"? Монеты будут выплачены всем победителям.`)) return;

  // get bet data
  const bSnap = await get(ref(db, 'bets/'+id));
  const bet = bSnap.val();
  const winPool = result === 'yes' ? (bet.yesPool||0) : (bet.noPool||0);
  const totalPool = (bet.yesPool||0) + (bet.noPool||0);

  // get all user bets for this bet
  const ubSnap = await get(ref(db, 'userBets'));
  const allUserBets = ubSnap.val() || {};

  let winners = 0;
  for (const [username, userBets] of Object.entries(allUserBets)) {
    const myBet = userBets[id];
    if (!myBet) continue;
    if (myBet.choice === result && winPool > 0) {
      // payout: proportional share of total pool
      const share = Math.floor((myBet.amount / winPool) * totalPool);
      const uSnap = await get(ref(db, 'users/'+username));
      if (uSnap.exists()) {
        const newCoins = (uSnap.val().coins || 0) + share;
        await update(ref(db, 'users/'+username), { coins: newCoins });
        winners++;
      }
    }
  }

  await update(ref(db, 'bets/'+id), { status: 'resolved', result });
  toast(`🎉 Готово! Выплачено ${winners} победителям из пула 🪙${totalPool}`);
  loadBets(); loadStats();
};

window.deleteBet = async (id) => {
  if (!confirm('Удалить ставку? Деньги игроков НЕ вернутся.')) return;
  await remove(ref(db, 'bets/'+id));
  toast('🗑️ Ставка удалена');
  loadBets(); loadStats();
};

// ── INIT ──
const initAdmin = () => {
  initOnline();
  loadStats();
  loadQuestions();
  loadBets();
  // set default date to tomorrow
  const tm = new Date(); tm.setDate(tm.getDate()+1);
  document.getElementById('qDate').value = tm.toISOString().slice(0,10);
  document.getElementById('bDeadline').value = tm.toISOString().slice(0,10);
};
</script>
