<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Factday</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 32px 20px 16px;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1px;
      color: #fff;
    }

    header h1 span { color: #f97316; }

    header p {
      color: #888;
      margin-top: 6px;
      font-size: 0.95rem;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }

    /* POLL */
    .poll-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 24px;
    }

    .poll-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #f97316;
      margin-bottom: 12px;
    }

    .poll-question {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 24px;
      line-height: 1.4;
    }

    .poll-options {
      display: flex;
      gap: 12px;
    }

    .poll-btn {
      flex: 1;
      padding: 14px;
      border: 2px solid #333;
      background: transparent;
      color: #fff;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .poll-btn:hover { border-color: #f97316; color: #f97316; }

    .poll-btn.voted-a { background: #f97316; border-color: #f97316; color: #fff; }
    .poll-btn.voted-b { background: #3b82f6; border-color: #3b82f6; color: #fff; }

    .poll-results {
      margin-top: 20px;
      display: none;
    }

    .result-row { margin-bottom: 12px; }

    .result-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      margin-bottom: 6px;
      color: #ccc;
    }

    .result-bar-bg {
      background: #2a2a2a;
      border-radius: 8px;
      height: 10px;
      overflow: hidden;
    }

    .result-bar {
      height: 100%;
      border-radius: 8px;
      transition: width 0.6s ease;
    }

    .bar-a { background: #f97316; }
    .bar-b { background: #3b82f6; }

    /* CHAT */
    .chat-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      overflow: hidden;
    }

    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid #2a2a2a;
      font-weight: 600;
      font-size: 0.95rem;
      color: #ccc;
    }

    .chat-messages {
      height: 320px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #f97316;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .msg-body {}

    .msg-name {
      font-size: 0.78rem;
      color: #888;
      margin-bottom: 3px;
    }

    .msg-text {
      background: #242424;
      padding: 8px 12px;
      border-radius: 0 10px 10px 10px;
      font-size: 0.92rem;
      line-height: 1.4;
      max-width: 400px;
      word-break: break-word;
    }

    .chat-input-area {
      padding: 14px 16px;
      border-top: 1px solid #2a2a2a;
      display: flex;
      gap: 10px;
    }

    .name-input, .msg-input {
      background: #242424;
      border: 1px solid #333;
      border-radius: 10px;
      color: #fff;
      padding: 10px 14px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .name-input { width: 110px; }
    .msg-input { flex: 1; }
    .name-input:focus, .msg-input:focus { border-color: #f97316; }

    .send-btn {
      background: #f97316;
      border: none;
      border-radius: 10px;
      color: #fff;
      padding: 10px 16px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .send-btn:hover { background: #ea6c0a; }

    .empty-chat {
      color: #555;
      text-align: center;
      margin: auto;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <h1>fact<span>day</span></h1>
  <p>Ежедневный вопрос — голосуй и обсуждай</p>
</header>

<div class="container">

  <!-- POLL -->
  <div class="poll-card">
    <div class="poll-label">Вопрос дня</div>
    <div class="poll-question" id="question">Загрузка...</div>
    <div class="poll-options">
      <button class="poll-btn" id="btnA" onclick="vote('a')">—</button>
      <button class="poll-btn" id="btnB" onclick="vote('b')">—</button>
    </div>
    <div class="poll-results" id="results">
      <div class="result-row">
        <div class="result-label">
          <span id="labelA">A</span>
          <span id="pctA">0%</span>
        </div>
        <div class="result-bar-bg"><div class="result-bar bar-a" id="barA" style="width:0%"></div></div>
      </div>
      <div class="result-row">
        <div class="result-label">
          <span id="labelB">B</span>
          <span id="pctB">0%</span>
        </div>
        <div class="result-bar-bg"><div class="result-bar bar-b" id="barB" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-card">
    <div class="chat-header">💬 Обсуждение</div>
    <div class="chat-messages" id="chatMessages">
      <div class="empty-chat">Будьте первым — напишите что думаете!</div>
    </div>
    <div class="chat-input-area">
      <input class="name-input" id="nameInput" placeholder="Ваше имя" maxlength="20">
      <input class="msg-input" id="msgInput" placeholder="Написать сообщение..." maxlength="300" onkeydown="if(event.key==='Enter') sendMsg()">
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>

</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, push, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDO7YaClNnlsyI-6OwIM_SQuD8Cf7x4PV8",
    authDomain: "factday-941ea.firebaseapp.com",
    databaseURL: "https://factday-941ea-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "factday-941ea",
    storageBucket: "factday-941ea.firebasestorage.app",
    messagingSenderId: "174146500396",
    appId: "1:174146500396:web:79e525da64d07fb2d45e89"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Определяем сегодняшнюю дату как ключ
  const today = new Date().toISOString().slice(0, 10);

  // Инициализируем вопрос дня если его нет
  const questionRef = ref(db, `polls/${today}`);
  get(questionRef).then(snap => {
    if (!snap.exists()) {
      // Дефолтный вопрос — вы можете менять его каждый день в Firebase
      set(questionRef, {
        question: "Что вкуснее?",
        optionA: "☕ Кофе",
        optionB: "🍵 Чай",
        votes: { a: 0, b: 0 }
      });
    }
  });

  // Слушаем вопрос и голоса
  onValue(questionRef, (snap) => {
    const data = snap.val();
    if (!data) return;

    document.getElementById('question').textContent = data.question;
    document.getElementById('btnA').textContent = data.optionA;
    document.getElementById('btnB').textContent = data.optionB;
    document.getElementById('labelA').textContent = data.optionA;
    document.getElementById('labelB').textContent = data.optionB;

    const vA = (data.votes?.a) || 0;
    const vB = (data.votes?.b) || 0;
    const total = vA + vB;

    if (total > 0) {
      const pA = Math.round(vA / total * 100);
      const pB = 100 - pA;
      document.getElementById('pctA').textContent = pA + '%';
      document.getElementById('pctB').textContent = pB + '%';
      document.getElementById('barA').style.width = pA + '%';
      document.getElementById('barB').style.width = pB + '%';
    }

    // Если уже голосовали
    const voted = localStorage.getItem('voted_' + today);
    if (voted) showResults(voted);
  });

  // Голосование
  window.vote = function(option) {
    const voted = localStorage.getItem('voted_' + today);
    if (voted) return;

    const votesRef = ref(db, `polls/${today}/votes/${option}`);
    get(votesRef).then(snap => {
      const current = snap.val() || 0;
      set(votesRef, current + 1);
      localStorage.setItem('voted_' + today, option);
      showResults(option);
    });
  };

  function showResults(voted) {
    document.getElementById('results').style.display = 'block';
    document.getElementById('btnA').classList.toggle('voted-a', voted === 'a');
    document.getElementById('btnB').classList.toggle('voted-b', voted === 'b');
    document.getElementById('btnA').disabled = true;
    document.getElementById('btnB').disabled = true;
  }

  // Чат
  const chatRef = ref(db, `chat/${today}`);

  onValue(chatRef, (snap) => {
    const msgs = snap.val();
    const container = document.getElementById('chatMessages');

    if (!msgs) {
      container.innerHTML = '<div class="empty-chat">Будьте первым — напишите что думаете!</div>';
      return;
    }

    container.innerHTML = '';
    const colors = ['#f97316','#3b82f6','#10b981','#8b5cf6','#ec4899','#f59e0b'];

    Object.values(msgs).forEach(msg => {
      const colorIndex = Math.abs(msg.name.split('').reduce((a,c) => a + c.charCodeAt(0), 0)) % colors.length;
      const div = document.createElement('div');
      div.className = 'msg';
      div.innerHTML = `
        <div class="msg-avatar" style="background:${colors[colorIndex]}">${msg.name[0].toUpperCase()}</div>
        <div class="msg-body">
          <div class="msg-name">${msg.name}</div>
          <div class="msg-text">${msg.text}</div>
        </div>
      `;
      container.appendChild(div);
    });

    container.scrollTop = container.scrollHeight;
  });

  window.sendMsg = function() {
    const name = document.getElementById('nameInput').value.trim() || 'Аноним';
    const text = document.getElementById('msgInput').value.trim();
    if (!text) return;

    push(chatRef, { name, text, time: Date.now() });
    document.getElementById('msgInput').value = '';
  };
</script>

</body>
</html>
